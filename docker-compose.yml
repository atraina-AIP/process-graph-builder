services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PROCESS_GRAPH_DEFAULT_TENANT=${PROCESS_GRAPH_DEFAULT_TENANT:-default}
      - PROCESS_GRAPH_STORE_KIND=${PROCESS_GRAPH_STORE_KIND:-}
      - COSMOS_URI=${COSMOS_URI:-}
      - COSMOS_KEY=${COSMOS_KEY:-}
      - COSMOS_DATABASE=${COSMOS_DATABASE:-process_graph_builder}
      - COSMOS_GRAPHS_CONTAINER=${COSMOS_GRAPHS_CONTAINER:-graphs}
      - COSMOS_MUTATION_BATCHES_CONTAINER=${COSMOS_MUTATION_BATCHES_CONTAINER:-mutation_batches}
      - COSMOS_CREATE_IF_MISSING=${COSMOS_CREATE_IF_MISSING:-true}
      - AZURE_SQL_CONNECTION_STRING=${AZURE_SQL_CONNECTION_STRING:-}
      - AZURE_SQL_CREATE_IF_MISSING=${AZURE_SQL_CREATE_IF_MISSING:-true}
      - AZURE_SQL_GRAPHS_TABLE=${AZURE_SQL_GRAPHS_TABLE:-process_graphs}
      - AZURE_SQL_MUTATION_BATCHES_TABLE=${AZURE_SQL_MUTATION_BATCHES_TABLE:-process_graph_mutation_batches}
    volumes:
      - ./data:/app/backend/data
