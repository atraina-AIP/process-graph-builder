services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Leave unset to use the deterministic fallback compiler.
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
    volumes:
      # Persist graph data between container restarts during local development.
      - ./data:/app/data
