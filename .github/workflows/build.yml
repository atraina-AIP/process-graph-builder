name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # required for OIDC token exchange
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        env:
          VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
        run: docker build --build-arg APP_VERSION=$VERSION -t process-graph-api:${{ github.sha }} .

      - name: Azure login
        if: github.event_name == 'push'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Push to ACR
        if: github.event_name == 'push'
        env:
          IMAGE: ${{ vars.ACR_NAME }}.azurecr.io/process-graph-api
          VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}
        run: |
          az acr login --name ${{ vars.ACR_NAME }}
          docker tag process-graph-api:${{ github.sha }} ${{ env.IMAGE }}:${{ env.VERSION }}
          docker tag process-graph-api:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ env.VERSION }}
          docker push ${{ env.IMAGE }}:latest
